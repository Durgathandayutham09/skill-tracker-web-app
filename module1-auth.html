<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillTracker – Authentication</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #3dd68c;
    --error: #ff5757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto ;
    position: relative;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(108,99,255,0.15); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,101,132,0.1); bottom: -80px; right: -80px; }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    padding: 20px;
  }

  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 12px;
    box-shadow: 0 0 40px rgba(108,99,255,0.4);
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 24px; letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .tabs {
    display: flex; gap: 4px;
    background: var(--bg);
    border-radius: 12px; padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1; padding: 10px;
    text-align: center; cursor: pointer;
    border-radius: 9px; font-size: 14px;
    font-weight: 500; transition: all 0.25s;
    color: var(--muted); border: none; background: none;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 15px rgba(108,99,255,0.4);
  }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; font-weight: 500; letter-spacing: 0.3px; }

  input {
    width: 100%; padding: 13px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
  input::placeholder { color: var(--muted); }

  .input-wrap { position: relative; }
  .input-wrap input { padding-right: 44px; }
  .eye-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 18px; line-height: 1; padding: 0;
  }

  .forgot { text-align: right; margin-top: -10px; margin-bottom: 18px; }
  .forgot a { font-size: 13px; color: var(--accent); text-decoration: none; }
  .forgot a:hover { text-decoration: underline; }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.25s;
    letter-spacing: 0.3px;
    position: relative; overflow: hidden;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(108,99,255,0.45); }
  .btn:active { transform: translateY(0); }
  .btn.loading::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0} 50%{opacity:1} }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 13px; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

  .google-btn {
    width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s;
  }
  .google-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.05); }
  .google-btn svg { width: 20px; height: 20px; }

  .alert {
    padding: 12px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px;
    display: none; align-items: center; gap: 8px;
  }
  .alert.error { background: rgba(255,87,87,0.12); border: 1px solid rgba(255,87,87,0.3); color: var(--error); display: flex; }
  .alert.success { background: rgba(61,214,140,0.12); border: 1px solid rgba(61,214,140,0.3); color: var(--success); display: flex; }

  .password-strength { margin-top: 6px; }
  .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-bottom: 4px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
  .strength-label { font-size: 11px; color: var(--muted); }

  .form-panel { display: none; }
  .form-panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Skill<span>Tracker</span></h1>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN FORM -->
    <div id="loginPanel" class="form-panel active">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="loginPassword" placeholder="••••••••" />
          <button class="eye-btn" onclick="togglePwd('loginPassword', this)">👁</button>
        </div>
      </div>
      
      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>
      <div class="divider">or continue with</div>
      <button class="google-btn" onclick="handleGoogleSignIn()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerPanel" class="form-panel">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="regPassword" placeholder="••••••••" oninput="checkStrength(this.value)" />
          <button class="eye-btn" onclick="togglePwd('regPassword', this)">👁</button>
        </div>
        <div class="password-strength">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="regConfirm" placeholder="••••••••" />
          <button class="eye-btn" onclick="togglePwd('regConfirm', this)">👁</button>
        </div>
      </div>
      <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account →</button>
      <div class="divider">or continue with</div>
      <button class="google-btn" onclick="handleGoogleSignIn()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDYpg5lNx6IDpddAreb2DR3bvV-eHmWLfM",
  authDomain: "skill-tracker-web-app.firebaseapp.com",
  projectId: "skill-tracker-web-app",
  storageBucket: "skill-tracker-web-app.firebasestorage.app",
  messagingSenderId: "799111862171",
  appId: "1:799111862171:web:9fc8c506abea6a6e03b33e"
};
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.handleLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
    setLoading('loginBtn', true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      showAlert('Welcome back, ' + (cred.user.displayName || 'User') + '! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'module2-addskills.html'; }, 1500);
    } catch (e) {
      showAlert(getFriendlyError(e.code), 'error');
    } finally { setLoading('loginBtn', false); }
  };

  window.handleRegister = async function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    if (!name || !email || !password || !confirm) { showAlert('Please fill in all fields.', 'error'); return; }
    if (password !== confirm) { showAlert('Passwords do not match.', 'error'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters.', 'error'); return; }
    setLoading('registerBtn', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      showAlert('Account created! Welcome, ' + name + '!', 'success');
      setTimeout(() => { window.location.href = 'module2-addskills.html'; }, 1500);
    } catch (e) {
      showAlert(getFriendlyError(e.code), 'error');
    } finally { setLoading('registerBtn', false); }
  };

  window.handleGoogleSignIn = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      showAlert('Signed in as ' + result.user.displayName + '!', 'success');
      setTimeout(() => { window.location.href = 'module2-addskills.html'; }, 1500);
    } catch (e) {
      showAlert(getFriendlyError(e.code), 'error');
    }
  };

  function getFriendlyError(code) {
    const map = {
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password is too weak.',
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/popup-closed-by-user': 'Sign-in popup was closed.',
    };
    return map[code] || 'An error occurred. Please try again.';
  }
</script>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0, msg = '', color = '';
    if (val.length >= 6) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [{w:'10%',c:'#ff5757',m:'Very Weak'},{w:'30%',c:'#ff8c57',m:'Weak'},{w:'55%',c:'#ffc857',m:'Fair'},{w:'80%',c:'#3dd68c',m:'Strong'},{w:'100%',c:'#00c9a7',m:'Very Strong'}];
    const l = levels[score] || levels[0];
    fill.style.width = l.w; fill.style.background = l.c; label.textContent = l.m;
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.className = 'alert ' + type;
    el.textContent = msg;
  }
  function hideAlert() {
    const el = document.getElementById('alertBox');
    el.className = 'alert';
  }

  function setLoading(id, state) {
    const btn = document.getElementById(id);
    btn.disabled = state;
    btn.classList.toggle('loading', state);
  }
</script>
</body>
</html>
