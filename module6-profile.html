<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillTracker – Profile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #f0f0f5;
    --card: #fff;
    --dark: #111;
    --accent: #5b21b6;
    --accent2: #0ea5e9;
    --text: #111;
    --muted: #777;
    --border: #e4e4ee;
    --green: #059669;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); }

  header { background: var(--dark); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #fff; }
  .brand span { color: #a78bfa; }
  .nav-links { display: flex; gap: 20px; }
  .nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
  .nav-links a.active, .nav-links a:hover { color: #fff; }

  /* PROFILE HERO */
  .profile-banner {
    background: linear-gradient(135deg, #1e1b4b, #4c1d95, #2563eb);
    height: 160px; position: relative;
  }
  .profile-main { padding: 0 32px; max-width: 900px; margin: 0 auto; }

  .avatar-area { display: flex; align-items: center; gap: 20px; padding-top: 0; margin-top: -50px; margin-bottom: 20px; }
  .avatar {
    width: 100px; height: 100px; border-radius: 50%;
    border: 4px solid white; background: linear-gradient(135deg, #5b21b6, #2563eb);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: white;
    flex-shrink: 0; cursor: pointer; position: relative; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; border-radius: 50%; font-size: 22px; }
  .avatar:hover .avatar-overlay { opacity: 1; }

  .profile-name-area { padding-bottom: 6px; }
  .profile-name { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
  .profile-handle { color: var(--muted); font-size: 14px; margin-top: 2px; }
  .career-badge { display: inline-flex; align-items: center; gap: 6px; background: #ede9fe; color: var(--accent); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 6px; }

  .profile-grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; margin-bottom: 28px; }
  @media(max-width:750px) { .profile-grid { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 0; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
  .edit-link { font-size: 13px; color: var(--accent); cursor: pointer; font-weight: 500; font-family: 'Manrope', sans-serif; }

  .info-field { margin-bottom: 16px; }
  .info-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .info-value { font-size: 15px; font-weight: 500; }
  .info-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Manrope', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; background: white; }
  .info-input:focus { border-color: var(--accent); }
  select.info-input { appearance: none; background: white; }

  .save-btn { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .save-btn:hover { box-shadow: 0 5px 15px rgba(91,33,182,0.35); }

  /* ACHIEVEMENTS */
  .achievements-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .achievement { text-align: center; padding: 16px 10px; background: var(--bg); border-radius: 12px; }
  .ach-icon { font-size: 28px; margin-bottom: 6px; }
  .ach-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .ach-desc { font-size: 11px; color: var(--muted); }
  .ach-locked { opacity: 0.3; }

  /* STATS */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-block { background: var(--bg); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* SKILL TAGS */
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
  .skill-tag-tech { background: #ede9fe; color: #5b21b6; }
  .skill-tag-soft { background: #fef3c7; color: #92400e; }
  .skill-tag-academic { background: #dcfce7; color: #166534; }

  /* ACTIVITY */
  .activity-list { display: flex; flex-direction: column; gap: 10px; }
  .activity-item { display: flex; gap: 12px; align-items: start; padding: 12px; background: var(--bg); border-radius: 10px; }
  .act-dot { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .act-info { flex: 1; }
  .act-title { font-size: 14px; font-weight: 500; }
  .act-time { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .logout-btn { width: 100%; padding: 12px; background: transparent; border: 1.5px solid #ef4444; color: #ef4444; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
  .logout-btn:hover { background: #fef2f2; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="brand">Skill<span>Tracker</span></div>
  <nav class="nav-links">
    <a href="module1-auth.html">Home</a>
    <a href="module2-addskills.html">Skills</a>
    <a href="module3-goals.html">Goals</a>
    <a href="module4-progress.html">Progress</a>
    <a href="module5-recommendations.html">Discover</a>
    <a href="#" class="active">Profile</a>
  </nav>
</header>

<div class="profile-banner"></div>

<div class="profile-main">
  <div class="avatar-area">
    <div class="avatar" id="avatarCircle" onclick="document.getElementById('avatarInput').click()">
      <span id="avatarInitials">JS</span>
      <div class="avatar-overlay">📷</div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarChange(event)">
    <div class="profile-name-area">
      <div class="profile-name" id="displayName">John Smith</div>
      <div class="profile-handle" id="displayHandle">@johnsmith</div>
      <div class="career-badge" id="displayCareer">🌐 Web Developer</div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-block"><div class="stat-num" id="statSkillsCount">0</div><div class="stat-lbl">Skills</div></div>
    <div class="stat-block"><div class="stat-num" id="statGoalsCount">0</div><div class="stat-lbl">Goals</div></div>
    <div class="stat-block"><div class="stat-num" id="statAvgProg">0%</div><div class="stat-lbl">Avg Progress</div></div>
  </div>

  <div class="profile-grid">
    <!-- LEFT: Edit Profile -->
    <div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Edit Profile</div>
        <div class="info-field">
          <div class="info-label">Full Name</div>
          <input class="info-input" type="text" id="editName" placeholder="Your full name" />
        </div>
        <div class="info-field">
          <div class="info-label">Username</div>
          <input class="info-input" type="text" id="editUsername" placeholder="@username" />
        </div>
        <div class="info-field">
          <div class="info-label">Email</div>
          <input class="info-input" type="email" id="editEmail" placeholder="you@example.com" />
        </div>
        <div class="info-field">
          <div class="info-label">Career Goal</div>
          <select class="info-input" id="editCareer">
            <option value="🌐 Web Developer">🌐 Web Developer</option>
            <option value="📊 Data Scientist">📊 Data Scientist</option>
            <option value="📱 Mobile Developer">📱 Mobile Developer</option>
            <option value="⚙️ DevOps Engineer">⚙️ DevOps Engineer</option>
            <option value="🎨 UI/UX Designer">🎨 UI/UX Designer</option>
            <option value="🤖 AI/ML Engineer">🤖 AI/ML Engineer</option>
          </select>
        </div>
        <div class="info-field">
          <div class="info-label">Bio</div>
          <textarea class="info-input" id="editBio" rows="3" placeholder="Tell something about yourself..." style="resize:vertical"></textarea>
        </div>
        <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
        <button class="logout-btn" onclick="handleLogout()">🚪 Sign Out</button>
      </div>
    </div>

    <!-- RIGHT: Skills, Achievements, Activity -->
    <div>
      <!-- Skills -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">My Skills <a class="edit-link" href="module2-addskills.html">Manage →</a></div>
        <div class="skill-tags" id="profileSkillTags">
          <span style="color:var(--muted);font-size:13px">No skills added yet.</span>
        </div>
      </div>

      <!-- Achievements -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Achievements</div>
        <div class="achievements-grid" id="achievementsGrid"></div>
      </div>

      <!-- Recent Activity -->
      <div class="card">
        <div class="card-title">Recent Activity</div>
        <div class="activity-list" id="activityList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
  getFirestore, doc, setDoc, getDoc,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDYpg5lNx6IDpddAreb2DR3bvV-eHmWLfM",
  authDomain: "skill-tracker-web-app.firebaseapp.com",
  projectId: "skill-tracker-web-app",
  storageBucket: "skill-tracker-web-app.firebasestorage.app",
  messagingSenderId: "799111862171",
  appId: "1:799111862171:web:9fc8c506abea6a6e03b33e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window.currentUser = null;
  async function loadSkillsFromFirestore() {
  if (!window.currentUser) return [];

  const snap = await getDocs(
    collection(db, 'users', window.currentUser.uid, 'skills')
  );

  return snap.docs.map(d => d.data());
}
window.loadSkillsFromFirestore = loadSkillsFromFirestore;


async function loadGoalsFromFirestore() {
  if (!window.currentUser) return [];

  const snap = await getDocs(
    collection(db, 'users', window.currentUser.uid, 'goals')
  );

  return snap.docs.map(d => d.data());
}
window.loadGoalsFromFirestore = loadGoalsFromFirestore;

  onAuthStateChanged(auth, async user => {
    if (user) {
      window.currentUser = user;
      const snap = await getDoc(doc(db, 'users', user.uid, 'profile', 'info'));
      const data = snap.exists() ? snap.data() : {};
      populateForm({ name: user.displayName||'User', email: user.email, ...data });
      await window.loadStats();
  await window.loadAchievements();
  await window.loadActivity();
}
    else {
      window.currentUser = null;
      const saved = JSON.parse(localStorage.getItem('userProfile')||'null');
      populateForm(saved || { name:'John Smith', username:'johnsmith', email:'john@example.com', career:'🌐 Web Developer', bio:'Aspiring web developer passionate about building great user experiences.' });
      await window.loadStats();
      await window.loadAchievements();
      await window.loadActivity();
    }
  });

  function populateForm(data) {
    document.getElementById('editName').value = data.name||'';
    document.getElementById('editUsername').value = data.username||'';
    document.getElementById('editEmail').value = data.email||'';
    document.getElementById('editCareer').value = data.career||'🌐 Web Developer';
    document.getElementById('editBio').value = data.bio||'';
    document.getElementById('displayName').textContent = data.name||'User';
    document.getElementById('displayHandle').textContent = '@' + (data.username||'user');
    document.getElementById('displayCareer').textContent = data.career||'🌐 Web Developer';
    const initials = (data.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('avatarInitials').textContent = initials;
  }

  window.saveProfile = async function() {
    const data = {
      name: document.getElementById('editName').value.trim(),
      username: document.getElementById('editUsername').value.trim().replace('@',''),
      email: document.getElementById('editEmail').value.trim(),
      career: document.getElementById('editCareer').value,
      bio: document.getElementById('editBio').value.trim(),
    };
    if (window.currentUser) {
      await updateProfile(window.currentUser, { displayName: data.name });
      await setDoc(doc(db, 'users', window.currentUser.uid, 'profile', 'info'), data);
    } else {
      localStorage.setItem('userProfile', JSON.stringify(data));
    }
    populateForm(data);
    showToast('✅ Profile saved!');
  };

  window.handleLogout = async function() {
    if (window.currentUser) { await signOut(auth); window.location.href = 'module1-auth.html'; }
    else { showToast('👋 Signed out (demo mode)'); }
  };
</script>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function handleAvatarChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const ac = document.getElementById('avatarCircle');
      document.getElementById('avatarInitials').textContent = '';
      let img = ac.querySelector('img');
      if (!img) { img = document.createElement('img'); ac.insertBefore(img, ac.firstChild); }
      img.src = ev.target.result;
      localStorage.setItem('avatarData', ev.target.result);
    };
    reader.readAsDataURL(file);
  }

  // Load saved avatar
  const savedAvatar = localStorage.getItem('avatarData');
  if (savedAvatar) {
    window.addEventListener('DOMContentLoaded', () => {
      const ac = document.getElementById('avatarCircle');
      document.getElementById('avatarInitials').textContent = '';
      const img = document.createElement('img');
      img.src = savedAvatar; ac.insertBefore(img, ac.firstChild);
    });
  }

  // Load stats from localStorage
  async function loadStats() {
    const skills = window.currentUser
  ? await window.loadSkillsFromFirestore()
  : JSON.parse(localStorage.getItem('demoSkills')||'[]');
    const goals = window.currentUser
  ? await window.loadGoalsFromFirestore()
  : JSON.parse(localStorage.getItem('demoGoals')||'[]');
    const avg = skills.length ? Math.round(skills.reduce((s,k)=>s+(k.progress||0),0)/skills.length) : 0;
    document.getElementById('statSkillsCount').textContent = skills.length;
    document.getElementById('statGoalsCount').textContent = goals.length;
    document.getElementById('statAvgProg').textContent = avg + '%';

    // Skill tags
    const tagsEl = document.getElementById('profileSkillTags');
    if (skills.length) {
      tagsEl.innerHTML = skills.map(s => `<span class="skill-tag skill-tag-${s.category}">${s.name}</span>`).join('');
    }
  }

  async function loadAchievements() {
    const skills = window.currentUser
  ? await window.loadSkillsFromFirestore()
  : JSON.parse(localStorage.getItem('demoSkills')||'[]');
    const goals = window.currentUser
  ? await window.loadGoalsFromFirestore()
  : JSON.parse(localStorage.getItem('demoGoals')||'[]');
    const achievements = [
      { icon:'🚀', name:'First Skill', desc:'Added your first skill', unlocked: skills.length >= 1 },
      { icon:'📚', name:'Knowledge Seeker', desc:'Added 5+ skills', unlocked: skills.length >= 5 },
      { icon:'🎯', name:'Goal Setter', desc:'Created your first goal', unlocked: goals.length >= 1 },
      { icon:'✅', name:'Achiever', desc:'Completed a goal', unlocked: goals.some(g=>g.completed) },
      { icon:'⚡', name:'Halfway There', desc:'Reached 50% on any skill', unlocked: skills.some(s=>(s.progress||0)>=50) },
      { icon:'🏆', name:'Master', desc:'Reached 100% on a skill', unlocked: skills.some(s=>(s.progress||0)>=100) },
    ];
    document.getElementById('achievementsGrid').innerHTML = achievements.map(a => `
      <div class="achievement ${a.unlocked?'':'ach-locked'}">
        <div class="ach-icon">${a.icon}</div>
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
      </div>
    `).join('');
  }

  async function loadActivity() {
    const skills = window.currentUser
  ? await window.loadSkillsFromFirestore()
  : JSON.parse(localStorage.getItem('demoSkills')||'[]');
    const goals = window.currentUser
  ? await window.loadGoalsFromFirestore()
  : JSON.parse(localStorage.getItem('demoGoals')||'[]');
    const activities = [
      ...skills.slice(0,2).map(s => ({ icon:'💡', bg:'#ede9fe', title:`Added skill: ${s.name}`, time:'Recently' })),
      ...goals.slice(0,2).map(g => ({ icon:'🎯', bg:'#dbeafe', title:`Set goal: ${g.title}`, time:'Recently' })),
    ];
    if (!activities.length) {
      document.getElementById('activityList').innerHTML = '<p style="color:var(--muted);font-size:13px">No activity yet. Start adding skills!</p>';
      return;
    }
    document.getElementById('activityList').innerHTML = activities.map(a => `
      <div class="activity-item">
        <div class="act-dot" style="background:${a.bg}">${a.icon}</div>
        <div class="act-info">
          <div class="act-title">${a.title}</div>
          <div class="act-time">${a.time}</div>
        </div>
      </div>
    `).join('');
  }
window.loadStats = loadStats;
window.loadAchievements = loadAchievements;
window.loadActivity = loadActivity;
  (async () => {
  await window.loadStats();
  await window.loadAchievements();
  await window.loadActivity();
})();
</script>
</body>
</html>
