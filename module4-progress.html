<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillTracker – Progress Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Outfit:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --purple: #a371f7;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
  .brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 20px; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; }
  .nav-links a.active, .nav-links a:hover { color: var(--text); }

  .page-top { padding: 40px 28px 24px; }
  .page-top h2 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
  .page-top p { color: var(--muted); margin-top: 6px; }

  .dashboard { padding: 0 28px 40px; max-width: 1200px; }

  /* KPI CARDS */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-blue::before { background: var(--accent); }
  .kpi-green::before { background: var(--green); }
  .kpi-orange::before { background: var(--orange); }
  .kpi-purple::before { background: var(--purple); }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* CHARTS ROW */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media(max-width:700px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 18px; }

  /* SKILL PROGRESS LIST */
  .skills-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 24px; }
  .skill-progress-item { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .skill-progress-item:last-child { border-bottom: none; }
  .sp-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .sp-info { flex: 1; }
  .sp-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .sp-bar-bg { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .sp-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .sp-percent { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; min-width: 40px; text-align: right; }
  .sp-cat { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-tech { background: rgba(88,166,255,0.1); color: var(--accent); }
  .badge-soft { background: rgba(210,153,34,0.1); color: var(--orange); }
  .badge-academic { background: rgba(163,113,247,0.1); color: var(--purple); }

  .doughnut-wrap { position: relative; max-width: 220px; margin: 0 auto; }
</style>
</head>
<body>

<header>
  <div class="brand">Skill<span>Tracker</span></div>
  <nav class="nav-links">
    <a href="module1-auth.html">Home</a>
    <a href="module2-addskills.html">Skills</a>
    <a href="module3-goals.html">Goals</a>
    <a href="#" class="active">Progress</a>
    <a href="module5-recommendations.html">Discover</a>
    <a href="module6-profile.html">Profile</a>
  </nav>
</header>

<div class="page-top">
  <h2>📊 Progress Dashboard</h2>
  <p>Visual overview of your skill development journey</p>
</div>

<div class="dashboard">
  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card kpi-blue"><div class="kpi-label">Total Skills</div><div class="kpi-value" id="kpiSkills">0</div></div>
    <div class="kpi-card kpi-green"><div class="kpi-label">Avg Progress</div><div class="kpi-value" id="kpiAvg">0%</div></div>
    <div class="kpi-card kpi-orange"><div class="kpi-label">Goals Completed</div><div class="kpi-value" id="kpiGoals">0</div></div>
    <div class="kpi-card kpi-purple"><div class="kpi-label">Mastered (≥80%)</div><div class="kpi-value" id="kpiMastered">0</div></div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Skills by Category</div>
      <div class="doughnut-wrap"><canvas id="catChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Progress Distribution</div>
      <canvas id="barChart" style="max-height:220px"></canvas>
    </div>
  </div>

  <!-- Skills List -->
  <div class="skills-section">
    <div class="chart-title" style="margin-bottom:10px">Individual Skill Progress</div>
    <div id="skillsList"></div>
  </div>

  <!-- Radar Chart -->
  <div class="chart-card">
    <div class="chart-title">Skill Radar Overview</div>
    <div style="max-width:380px;margin:0 auto"><canvas id="radarChart"></canvas></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYpg5lNx6IDpddAreb2DR3bvV-eHmWLfM",
  authDomain: "skill-tracker-web-app.firebaseapp.com",
  projectId: "skill-tracker-web-app",
  storageBucket: "skill-tracker-web-app.firebasestorage.app",
  messagingSenderId: "799111862171",
  appId: "1:799111862171:web:9fc8c506abea6a6e03b33e"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "module1-auth.html";
    return;
  }

  const skillsSnap = await getDocs(collection(db, "users", user.uid, "skills"));

  const demoSkills = skillsSnap.docs.map(doc => {
    const data = doc.data();
    return {
      id: doc.id,
      name: data.name || '',
      category: data.category || 'technical',
      progress: Number(data.progress) || 0
    };
  });

  loadDashboard(demoSkills);
});
  const catColors = { technical: '#58a6ff', soft: '#d29922', academic: '#a371f7' };
  const catIcons = { technical: '💻', soft: '🤝', academic: '🎓' };

 function loadDashboard(demoSkills) {

  const completedGoals = 0; // adjust later if goals from Firestore

  // KPIs
  const avg = demoSkills.length > 0
    ? Math.round(demoSkills.reduce((s,k)=>s+k.progress,0)/demoSkills.length)
    : 0;

  document.getElementById('kpiSkills').textContent = demoSkills.length;
  document.getElementById('kpiAvg').textContent = avg + '%';
  document.getElementById('kpiGoals').textContent = completedGoals;
  document.getElementById('kpiMastered').textContent =
    demoSkills.filter(s=>s.progress>=80).length;

  // Category Count
  const cats = { technical: 0, soft: 0, academic: 0 };
  demoSkills.forEach(s => cats[s.category] = (cats[s.category]||0) + 1);

  new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: ['Technical', 'Soft Skills', 'Academic'],
      datasets: [{
        data: [cats.technical, cats.soft, cats.academic],
        backgroundColor: ['#58a6ff','#d29922','#a371f7'],
        borderWidth: 0
      }]
    },
    options: { plugins: { legend: { labels: { color: '#e6edf3' } } }, cutout: '65%' }
  });

  const labels = ['0-20%','21-40%','41-60%','61-80%','81-100%'];

  const counts = [
    demoSkills.filter(s => s.progress >= 0  && s.progress <= 20).length,
    demoSkills.filter(s => s.progress > 20  && s.progress <= 40).length,
    demoSkills.filter(s => s.progress > 40  && s.progress <= 60).length,
    demoSkills.filter(s => s.progress > 60  && s.progress <= 80).length,
    demoSkills.filter(s => s.progress > 80  && s.progress <= 100).length
  ];

  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: counts }] }
  });

  // Skill List
  const list = document.getElementById('skillsList');
  list.innerHTML = demoSkills.map(s => `
  <div class="skill-progress-item">
    <div class="sp-icon badge-${s.category}">
      ${catIcons[s.category] || ''}
    </div>

    <div class="sp-info">
      <div class="sp-name">${s.name}</div>
      <div class="sp-bar-bg">
        <div
          class="sp-bar-fill"
          style="width:${s.progress}%; background:${catColors[s.category] || '#58a6ff'}">
        </div>
      </div>
      <div class="sp-cat">${s.category}</div>
    </div>

    <div class="sp-percent">${s.progress}%</div>
  </div>
`).join('');
  // ===== RADAR CHART =====
  if (demoSkills.length > 0) {

    const topSkills = demoSkills.slice(0, 6);

    new Chart(document.getElementById('radarChart'), {
      type: 'radar',
      data: {
        labels: topSkills.map(s => s.name),
        datasets: [{
          label: 'Progress',
          data: topSkills.map(s => s.progress),
          backgroundColor: 'rgba(88,166,255,0.2)',
          borderColor: '#58a6ff',
          pointBackgroundColor: '#58a6ff',
          borderWidth: 2
        }]
      },
      options: {
        plugins: {
          legend: { labels: { color: '#e6edf3' } }
        },
        scales: {
          r: {
            min: 0,
            max: 100,
            ticks: { color: '#8b949e' },
            grid: { color: '#30363d' },
            angleLines: { color: '#30363d' },
            pointLabels: { color: '#e6edf3' }
          }
        }
      }
    });

  }
}
</script>
</body>
</html>
